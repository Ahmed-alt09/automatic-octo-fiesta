rules:
  - id: wpdb-string-on-numeric-column
    patterns:
      - pattern: $wpdb->prepare("... WHERE $COL = %s ...", ...)
      - metavariable-regex:
          metavariable: $COL
          regex: (ID|user_id|post_id|id)
    message: String format specifier used on likely-numeric column $COL
    languages: [php]
    severity: WARNING
